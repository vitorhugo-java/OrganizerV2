name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    name: Build ${{ matrix.binary }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: organizer-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            binary: organizer-linux-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: organizer-windows-amd64.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.event.workflow_run.head_branch }}
        run: |
          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o ${{ matrix.binary }} \
            ./cmd/organizer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          files: |
            organizer-linux-amd64
            organizer-linux-arm64
            organizer-windows-amd64.exe
          generate_release_notes: true
